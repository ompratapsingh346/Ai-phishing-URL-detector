<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>AI Phishing Dashboard</title>

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <link rel="stylesheet"
          href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

    <style>

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:Arial;
        }

        body{

            background:#020617;

            color:white;

            display:flex;
        }

        /* ALERT */

        .alert{

            position:fixed;

            top:20px;

            right:20px;

            background:#ef4444;

            color:white;

            padding:20px 30px;

            border-radius:15px;

            font-size:18px;

            font-weight:bold;

            display:none;

            z-index:1000;

            animation:slide 0.5s ease;
        }

        @keyframes slide{

            from{
                transform:translateX(100%);
            }

            to{
                transform:translateX(0);
            }
        }

        /* SIDEBAR */

        .sidebar{

            width:250px;

            height:100vh;

            background:#0f172a;

            padding:20px;

            position:fixed;

            left:0;
            top:0;
        }

        .logo{

            font-size:40px;

            font-weight:bold;

            margin-bottom:50px;

            text-align:center;

            color:#3b82f6;
        }

        .menu{

            list-style:none;
        }

        .menu li{

            padding:18px;

            margin-bottom:15px;

            border-radius:12px;

            cursor:pointer;

            transition:0.3s;

            font-size:20px;
        }

        .menu li:hover{

            background:#1e293b;
        }

        .menu i{

            margin-right:12px;
        }

        /* MAIN */

        .main{

            margin-left:250px;

            width:100%;

            padding:25px;
        }

        /* TOPBAR */

        .topbar{

            background:#0f172a;

            padding:25px;

            border-radius:20px;

            margin-bottom:25px;

            display:flex;

            justify-content:space-between;

            align-items:center;
        }

        .topbar h1{

            font-size:50px;
        }

        .topbar button{

            background:#2563eb;

            color:white;

            border:none;

            padding:15px 30px;

            border-radius:12px;

            cursor:pointer;

            font-size:18px;
        }

        .topbar button:hover{

            background:#1d4ed8;
        }

        /* SEARCH */

        .search-box{

            background:#0f172a;

            padding:20px;

            border-radius:20px;

            margin-bottom:25px;
        }

        .search-box input{

            width:100%;

            padding:18px;

            border:none;

            border-radius:12px;

            background:#1e293b;

            color:white;

            font-size:18px;
        }

        /* SCANNER */

        .scanner-box{

            background:#0f172a;

            padding:20px;

            border-radius:20px;

            display:flex;

            gap:15px;

            margin-bottom:25px;
        }

        .scanner-box input{

            flex:1;

            padding:18px;

            border:none;

            border-radius:12px;

            font-size:18px;

            background:#1e293b;

            color:white;
        }

        .scanner-box button{

            background:#2563eb;

            color:white;

            border:none;

            padding:18px 30px;

            border-radius:12px;

            cursor:pointer;

            font-size:18px;
        }

        .scanner-box button:hover{

            background:#1d4ed8;
        }

        /* RESULT */

        .scan-result{

            background:#0f172a;

            padding:25px;

            border-radius:20px;

            margin-bottom:25px;

            display:none;
        }

        .safe-text{

            color:#22c55e;

            font-weight:bold;
        }

        .phishing-text{

            color:#ef4444;

            font-weight:bold;
        }

        /* CARDS */

        .cards{

            display:grid;

            grid-template-columns:
                    repeat(auto-fit,minmax(250px,1fr));

            gap:20px;

            margin-bottom:30px;
        }

        .card{

            background:#0f172a;

            padding:30px;

            border-radius:20px;

            transition:0.3s;
        }

        .card:hover{

            transform:translateY(-5px);
        }

        .card h3{

            color:#94a3b8;

            margin-bottom:15px;

            font-size:25px;
        }

        .card h2{

            font-size:65px;
        }

        /* CHART */

        .chart-section{

            background:#0f172a;

            padding:30px;

            border-radius:20px;

            margin-bottom:30px;
        }

        .chart-section h2{

            margin-bottom:25px;

            font-size:40px;
        }

        .chart-container{

            width:350px;

            margin:auto;
        }

        /* TABLE */

        .table-section{

            background:#0f172a;

            padding:30px;

            border-radius:20px;
        }

        .table-section h2{

            margin-bottom:25px;

            font-size:40px;
        }

        table{

            width:100%;

            border-collapse:collapse;
        }

        table th{

            background:#1e293b;

            padding:18px;

            text-align:left;

            font-size:20px;
        }

        table td{

            padding:18px;

            border-bottom:1px solid #334155;

            font-size:18px;
        }

        table tr:hover{

            background:#1e293b;
        }

        .safe{

            color:#22c55e;

            font-weight:bold;
        }

        .phishing{

            color:#ef4444;

            font-weight:bold;
        }

    </style>

</head>

<body>

<!-- ALERT -->

<div id="alertBox"
     class="alert">

    ⚠ PHISHING WEBSITE DETECTED

</div>

<!-- SIDEBAR -->

<div class="sidebar">

    <div class="logo">
        AI Shield
    </div>

    <ul class="menu">

        <li>
            <i class="fa-solid fa-chart-line"></i>
            Dashboard
        </li>

        <li>
            <i class="fa-solid fa-shield-halved"></i>
            Threat Analysis
        </li>

        <li>
            <i class="fa-solid fa-globe"></i>
            URL Scans
        </li>

        <li>
            <i class="fa-solid fa-database"></i>
            Database
        </li>

        <li>
            <i class="fa-solid fa-gear"></i>
            Settings
        </li>

    </ul>

</div>

<!-- MAIN -->

<div class="main">

    <!-- TOPBAR -->

    <div class="topbar">

        <h1>
            AI Phishing Detection Dashboard
        </h1>

        <button onclick="downloadReport()">
            Generate Report
        </button>

    </div>

    <!-- SEARCH -->

    <div class="search-box">

        <input type="text"
               id="searchInput"
               placeholder="Search URL..."
               onkeyup="filterTable()">

    </div>

    <!-- LIVE SCANNER -->

    <div class="scanner-box">

        <input type="text"
               id="urlInput"
               placeholder="Enter website URL...">

        <button onclick="scanURL()">
            Scan URL
        </button>

    </div>

    <!-- RESULT -->

    <div id="scanResult"
         class="scan-result">
    </div>

    <!-- CARDS -->

    <div class="cards">

        <div class="card">

            <h3>Total Scans</h3>

            <h2 id="totalScans">
                0
            </h2>

        </div>

        <div class="card">

            <h3>Safe URLs</h3>

            <h2 id="safeCount">
                0
            </h2>

        </div>

        <div class="card">

            <h3>Phishing URLs</h3>

            <h2 id="phishingCount">
                0
            </h2>

        </div>

    </div>

    <!-- CHART -->

    <div class="chart-section">

        <h2>
            Threat Analytics
        </h2>

        <div class="chart-container">

            <canvas id="myChart"></canvas>

        </div>

    </div>

    <!-- TABLE -->

    <div class="table-section">

        <h2>
            Recent Scan Activity
        </h2>

        <table>

            <thead>

            <tr>

                <th>URL</th>

                <th>Result</th>

                <th>Time</th>

            </tr>

            </thead>

            <tbody id="historyTable">

            </tbody>

        </table>

    </div>

</div>

<script>

    async function scanURL(){

        const url =
            document.getElementById("urlInput").value;

        const response =
            await fetch(
                "http://localhost:8080/scan",
                {

                    method:"POST",

                    headers:{
                        "Content-Type":"application/json"
                    },

                    body:JSON.stringify({
                        url:url
                    })
                }
            );

        const data =
            await response.json();

        const resultBox =
            document.getElementById("scanResult");

        resultBox.style.display = "block";

        if(
            data.result.includes("Phishing")
        ){

            const alertBox =
                document.getElementById("alertBox");

            alertBox.style.display = "block";

            setTimeout(() => {

                alertBox.style.display = "none";

            }, 3000);
        }

        resultBox.innerHTML = `

            <h2>
                Scan Result
            </h2>

            <br>

            <p>
                <strong>URL:</strong>
                ${data.url}
            </p>

            <br>

            <p class="${
                data.result.includes("Safe")
                ? "safe-text"
                : "phishing-text"
            }">

                <strong>Result:</strong>
                ${data.result}

            </p>

            <br>

            <p>
                <strong>Risk Score:</strong>
                ${data.riskScore}
            </p>

        `;

        loadDashboard();
    }

    function filterTable(){

        const input =
            document.getElementById("searchInput");

        const filter =
            input.value.toLowerCase();

        const table =
            document.getElementById("historyTable");

        const rows =
            table.getElementsByTagName("tr");

        for(let i = 0; i < rows.length; i++){

            const url =
                rows[i]
                .getElementsByTagName("td")[0];

            if(url){

                const text =
                    url.textContent
                    || url.innerText;

                rows[i].style.display =
                    text.toLowerCase().includes(filter)
                    ? ""
                    : "none";
            }
        }
    }

    function downloadReport(){

        window.print();
    }

    async function loadDashboard(){

        const response =
            await fetch(
                "http://localhost:8080/history"
            );

        const data =
            await response.json();

        let safe = 0;

        let phishing = 0;

        const table =
            document.getElementById("historyTable");

        table.innerHTML = "";

        data.forEach(item => {

            if(
                item.result.includes("Safe")
            ){
                safe++;
            }
            else{
                phishing++;
            }

            table.innerHTML += `

                <tr>

                    <td>${item.url}</td>

                    <td class="${
                        item.result.includes("Safe")
                        ? "safe"
                        : "phishing"
                    }">

                        ${item.result}

                    </td>

                    <td>

                        ${
                            new Date(item.scannedAt)
                            .toLocaleString()
                        }

                    </td>

                </tr>
            `;
        });

        animateValue(
            "totalScans",
            data.length
        );

        animateValue(
            "safeCount",
            safe
        );

        animateValue(
            "phishingCount",
            phishing
        );

        new Chart(
            document.getElementById("myChart"),
            {

                type:'doughnut',

                data:{

                    labels:[
                        'Safe',
                        'Phishing'
                    ],

                    datasets:[{

                        data:[
                            safe,
                            phishing
                        ],

                        backgroundColor:[

                            '#22c55e',

                            '#ef4444'
                        ],

                        borderWidth:0
                    }]
                },

                options:{

                    responsive:true,

                    cutout:'70%',

                    plugins:{

                        legend:{

                            labels:{

                                color:'white',

                                font:{
                                    size:16
                                }
                            }
                        }
                    }
                }
            }
        );
    }

    function animateValue(id, end){

        let start = 0;

        const duration = 1000;

        const increment =
            end / (duration / 10);

        const obj =
            document.getElementById(id);

        const timer =
            setInterval(() => {

                start += increment;

                if(start >= end){

                    start = end;

                    clearInterval(timer);
                }

                obj.innerText =
                    Math.floor(start);

            }, 10);
    }

    loadDashboard();

</script>

</body>

</html>
